name: Daily News Generate

on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Fetch and Generate
        id: generate
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pnpm generate
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "file=src/content/daily/$(date -u +%Y-%m-%d).md" >> $GITHUB_OUTPUT

      - name: Commit and Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/daily/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify Webhook (Success)
        if: success() && steps.commit.outputs.changed == 'true' && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_TYPE: ${{ secrets.WEBHOOK_TYPE }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REPORT_DATE: ${{ steps.generate.outputs.date }}
        run: node scripts/notify.mjs success

      - name: Notify Webhook (Failure)
        if: failure() && env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_TYPE: ${{ secrets.WEBHOOK_TYPE }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REPORT_DATE: ${{ steps.generate.outputs.date }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify.mjs failure
